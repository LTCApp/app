<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - سوق الجملة</title>
    <link rel="stylesheet" href="auth-style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Animation -->
    <div class="animated-bg">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Main Container -->
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-right"></i>
            </button>
            <div class="logo">
                <i class="fas fa-shopping-cart"></i>
                <h1>سوق الجملة</h1>
            </div>
        </div>

        <!-- Register Card -->
        <div class="auth-card register-card">
            <div class="card-header">
                <div class="welcome-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h2>إنشاء حساب جديد</h2>
                <p>انضم إلينا واستمتع بأفضل تجربة تسوق</p>
            </div>

            <!-- Registration Method Info -->
            <div class="register-method-info">
                <div class="method-indicator">
                    <i class="fas fa-mobile-alt"></i>
                    <span>إنشاء حساب برقم الموبايل</span>
                </div>
            </div>

            <!-- Phone Registration Form -->
            <form id="phoneRegisterForm" class="auth-form active">
                <div class="form-group">
                    <label for="phoneFullName">
                        <i class="fas fa-user"></i>
                        الاسم الكامل
                    </label>
                    <input type="text" id="phoneFullName" placeholder="أدخل اسمك الكامل" required>
                </div>

                <div class="form-group">
                    <label for="phoneRegisterNumber">
                        <i class="fas fa-mobile-alt"></i>
                        رقم الموبايل
                    </label>
                    <div class="phone-input-wrapper">
                        <select class="country-code" id="phoneCountryCode">
                            <option value="+20" selected>🇪🇬 +20</option>
                            <option value="+966">🇸🇦 +966</option>
                            <option value="+971">🇦🇪 +971</option>
                            <option value="+965">🇰🇼 +965</option>
                            <option value="+974">🇶🇦 +974</option>
                            <option value="+973">🇧🇭 +973</option>
                            <option value="+968">🇴🇲 +968</option>
                            <option value="+962">🇯🇴 +962</option>
                            <option value="+961">🇱🇧 +961</option>
                            <option value="+1">🇺🇸 +1</option>
                        </select>
                        <input type="tel" id="phoneRegisterNumber" class="phone-input" placeholder="1001470449" required>
                    </div>
                    <span class="input-hint">سنرسل لك كود تحقق عبر SMS</span>
                </div>

                <div class="form-group">
                    <label for="phoneRegisterEmail">
                        <i class="fas fa-envelope"></i>
                        البريد الإلكتروني (اختياري)
                    </label>
                    <input type="email" id="phoneRegisterEmail" placeholder="example@gmail.com">
                </div>

                <div class="form-group">
                    <label for="phoneRegisterPassword">
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="phoneRegisterPassword" placeholder="أدخل كلمة المرور" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('phoneRegisterPassword')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="phoneStrengthFill"></div>
                        </div>
                        <span class="strength-text" id="phoneStrengthText">ضعيفة</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phoneConfirmPassword">
                        <i class="fas fa-lock-open"></i>
                        تأكيد كلمة المرور
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="phoneConfirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('phoneConfirmPassword')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group terms-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="phoneAcceptTerms" required>
                        <span class="checkmark"></span>
                        <span class="checkbox-label">
                            أوافق على <a href="#" onclick="showTerms(); return false;">الشروط والأحكام</a> و <a href="#" onclick="showPrivacy(); return false;">سياسة الخصوصية</a>
                        </span>
                    </label>
                </div>

                <button type="submit" class="submit-btn register-btn">
                    <i class="fas fa-user-plus"></i>
                    <span>إنشاء حساب</span>
                    <div class="btn-loader" style="display: none;"></div>
                </button>
            </form>



            <!-- OTP Verification Section -->
            <div id="otpRegisterSection" class="otp-section" style="display: none;">
                <div class="otp-header">
                    <button class="back-otp-btn" onclick="backFromRegisterOTP()">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <div class="otp-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h3>كود التحقق</h3>
                    <p>تم إرسال كود التحقق المكون من 6 أرقام إلى</p>
                    <div class="sent-to">
                        <span id="sentToRegisterNumber"></span>
                    </div>
                </div>

                <form id="otpRegisterVerifyForm">
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" class="otp-digit-register" data-index="0" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit-register" data-index="1" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit-register" data-index="2" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit-register" data-index="3" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit-register" data-index="4" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit-register" data-index="5" autocomplete="off">
                    </div>

                    <div class="otp-timer">
                        <i class="fas fa-clock"></i>
                        <span id="timerRegisterText">إعادة الإرسال خلال: <strong id="countdownRegister">60</strong> ثانية</span>
                    </div>

                    <button type="submit" class="submit-btn verify-btn">
                        <i class="fas fa-check-circle"></i>
                        <span>تحقق من الكود</span>
                    </button>

                    <button type="button" class="resend-btn" id="resendRegisterBtn" disabled>
                        <i class="fas fa-redo"></i>
                        إعادة إرسال الكود
                    </button>
                </form>
            </div>

            <!-- Social Register -->
            <div class="social-login">
                <div class="divider">
                    <span>أو إنشاء حساب بـ Google</span>
                </div>

                <div class="social-buttons">
                    <button class="social-btn google-btn" onclick="registerWithGoogle()">
                        <i class="fab fa-google"></i>
                        <span>إنشاء حساب بـ Google</span>
                    </button>
                </div>
            </div>

            <!-- Login Link -->
            <div class="bottom-link">
                <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast" style="display: none;">
        <i class="toast-icon"></i>
        <span class="toast-message"></span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p id="loadingText">جاري إنشاء الحساب...</p>
    </div>

    <script src="auth-system.js"></script>
    <script src="register-handler.js"></script>
</body>
</html>
