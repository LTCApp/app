<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سوق الجملة</title>
    <link rel="stylesheet" href="auth-style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background Animation -->
    <div class="animated-bg">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Main Container -->
    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
            <button class="back-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-arrow-right"></i>
            </button>
            <div class="logo">
                <i class="fas fa-shopping-cart"></i>
                <h1>سوق الجملة</h1>
            </div>
        </div>

        <!-- Login Card -->
        <div class="auth-card">
            <div class="card-header">
                <div class="welcome-icon">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h2>مرحباً بعودتك!</h2>
                <p>سجل دخولك للاستمتاع بتجربة تسوق مميزة</p>
            </div>

            <!-- Login Method Info -->
            <div class="login-method-info">
                <div class="method-indicator">
                    <i class="fas fa-mobile-alt"></i>
                    <span>تسجيل الدخول برقم الموبايل</span>
                </div>
            </div>

            <!-- Phone Login Form -->
            <form id="phoneLoginForm" class="auth-form active">
                <div class="form-group">
                    <label for="phoneNumber">
                        <i class="fas fa-mobile-alt"></i>
                        رقم الموبايل
                    </label>
                    <div class="phone-input-wrapper">
                        <select class="country-code" id="countryCode">
                            <option value="+20" selected>🇪🇬 +20</option>
                            <option value="+966">🇸🇦 +966</option>
                            <option value="+971">🇦🇪 +971</option>
                            <option value="+965">🇰🇼 +965</option>
                            <option value="+974">🇶🇦 +974</option>
                            <option value="+973">🇧🇭 +973</option>
                            <option value="+968">🇴🇲 +968</option>
                            <option value="+962">🇯🇴 +962</option>
                            <option value="+961">🇱🇧 +961</option>
                            <option value="+1">🇺🇸 +1</option>
                        </select>
                        <input type="tel" id="phoneNumber" class="phone-input" placeholder="1001470449" required>
                    </div>
                    <span class="input-hint">سنرسل لك كود تحقق عبر SMS</span>
                </div>

                <div class="form-group password-group" id="phonePasswordGroup" style="display: none;">
                    <label for="phonePassword">
                        <i class="fas fa-lock"></i>
                        كلمة المرور
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="phonePassword" placeholder="أدخل كلمة المرور">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('phonePassword')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options" id="phoneOptions" style="display: none;">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberPhone">
                        <span class="checkmark"></span>
                        <span class="checkbox-label">تذكرني</span>
                    </label>
                    <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="submit-btn phone-submit">
                    <i class="fas fa-paper-plane"></i>
                    <span>إرسال كود التحقق</span>
                    <div class="btn-loader" style="display: none;"></div>
                </button>
            </form>



            <!-- OTP Verification Section -->
            <div id="otpSection" class="otp-section" style="display: none;">
                <div class="otp-header">
                    <button class="back-otp-btn" onclick="backFromOTP()">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <div class="otp-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h3>كود التحقق</h3>
                    <p>تم إرسال كود التحقق المكون من 6 أرقام إلى</p>
                    <div class="sent-to">
                        <span id="sentToNumber"></span>
                    </div>
                </div>

                <form id="otpVerifyForm">
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" class="otp-digit" data-index="0" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit" data-index="1" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit" data-index="2" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit" data-index="3" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit" data-index="4" autocomplete="off">
                        <input type="text" maxlength="1" class="otp-digit" data-index="5" autocomplete="off">
                    </div>

                    <div class="otp-timer">
                        <i class="fas fa-clock"></i>
                        <span id="timerText">إعادة الإرسال خلال: <strong id="countdown">60</strong> ثانية</span>
                    </div>

                    <button type="submit" class="submit-btn verify-btn">
                        <i class="fas fa-check-circle"></i>
                        <span>تحقق من الكود</span>
                    </button>

                    <button type="button" class="resend-btn" id="resendBtn" disabled>
                        <i class="fas fa-redo"></i>
                        إعادة إرسال الكود
                    </button>
                </form>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <div class="divider">
                    <span>أو الدخول بحساب Google</span>
                </div>

                <div class="social-buttons">
                    <button class="social-btn google-btn" onclick="loginWithGoogle()">
                        <i class="fab fa-google"></i>
                        <span>الدخول بحساب Google</span>
                    </button>
                </div>
            </div>

            <!-- Register Link -->
            <div class="bottom-link">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast" style="display: none;">
        <i class="toast-icon"></i>
        <span class="toast-message"></span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <p id="loadingText">جاري تسجيل الدخول...</p>
    </div>

    <script src="auth-system.js"></script>
    <script src="login-handler.js"></script>
</body>
</html>
